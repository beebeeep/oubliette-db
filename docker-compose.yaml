services:
  fdb:
    container_name: fdb
    image: foundationdb/foundationdb:7.3.62
    volumes:
      - type: volume
        source: dbdata
        target: /var/fdb/
    ports:
      - 4500:4500
    post_start:
      - command: ["fdbcli", "--exec", "configure new single ssd-redwood-1"]

volumes:
  dbdata:
